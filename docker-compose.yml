version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-sk-5c6052d783934e59a0a3a73066a3cdcd}
      - AMAP_MAPS_API_KEY=${AMAP_MAPS_API_KEY:-0ed6e5ef8effdc096432cd039075c0fc}
    volumes:
      - ./backend:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - trip-planner-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - trip-planner-network
    environment:
      - VITE_API_BASE_URL=http://backend:8000

networks:
  trip-planner-network:
    driver: bridge
