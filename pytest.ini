[pytest]
testpaths = backend/tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
    requires_mcp: Tests requiring MCP connection
    requires_llm: Tests requiring LLM calls
    asyncio: Asyncio tests

addopts =
    -v
    --tb=short
    --strict-markers

filterwarnings =
    ignore::DeprecationWarning